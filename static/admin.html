<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quản lý - Chợ Đồ Cũ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--brown:#8b5a2b;--dark:#1a1209;--gold:#d4a96a;--light:#faf7f2;--red:#e84141;--green:#2e7d32}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f4f0e8;color:var(--dark)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#c8956c;border-radius:99px}
header{background:var(--dark);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:58px;border-bottom:2px solid var(--brown);position:sticky;top:0;z-index:50}
.logo{font-family:'Playfair Display',serif;font-weight:900;font-size:17px;color:var(--gold);display:flex;align-items:center;gap:8px}
.badge-admin{background:var(--brown);color:#fff;font-size:9px;padding:2px 8px;border-radius:99px;letter-spacing:1px}
.h-right{display:flex;gap:8px}
.btn-hdr{background:transparent;border:1.5px solid var(--gold);color:var(--gold);border-radius:99px;padding:6px 13px;font-family:'DM Sans';font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px}
.btn-logout{border-color:#e84141;color:#e84141}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px;background:var(--dark)}
@media(min-width:500px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:rgba(255,255,255,.07);border:1px solid rgba(212,169,106,.2);border-radius:12px;padding:14px;text-align:center}
.stat-n{font-family:'Playfair Display',serif;font-weight:700;font-size:24px;color:var(--gold);display:block;margin-bottom:4px}
.stat-l{color:#a08060;font-size:11px}
.tabs{display:flex;padding:0 16px;background:#fff;border-bottom:1px solid #e8ddd0;position:sticky;top:58px;z-index:40}
.tab{padding:14px 18px;font-family:'DM Sans';font-size:13px;font-weight:500;color:#8b6a4a;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--brown);border-color:var(--brown)}
.panel{display:none;padding:16px}
.panel.on{display:block}
.form-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(139,90,43,.07);margin-bottom:16px}
.form-title{font-family:'Playfair Display',serif;font-weight:700;font-size:18px;margin-bottom:16px}
.field{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;color:var(--brown);letter-spacing:.5px;margin-bottom:5px}
input[type=text],input[type=number],input[type=tel],textarea,select{width:100%;border:1.5px solid #ddd5c8;border-radius:10px;padding:10px 13px;font-family:'DM Sans';font-size:14px;color:var(--dark);outline:none;background:#fdfaf6;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.img-preview{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:10px;margin-top:8px;display:none}
.img-ph{width:100%;height:120px;background:linear-gradient(135deg,#fdf3e7,#fae8cc);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-top:8px;border:2px dashed #d4a96a;cursor:pointer}
.btn-submit{width:100%;background:var(--brown);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'DM Sans';font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-submit:disabled{background:#ccc;cursor:not-allowed}
.admin-search{background:#fff;border:1.5px solid #ddd5c8;border-radius:10px;padding:10px 14px;font-family:'DM Sans';font-size:14px;width:100%;margin-bottom:12px;outline:none}
.admin-search:focus{border-color:var(--gold)}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{border:1.5px solid #ddd5c8;background:#fff;padding:6px 13px;border-radius:99px;font-family:'DM Sans';font-size:12px;cursor:pointer;color:#8b6a4a}
.filter-btn.on{background:var(--brown);color:#fff;border-color:var(--brown)}
.prod-item{background:#fff;border-radius:14px;padding:12px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 2px 10px rgba(139,90,43,.06);margin-bottom:10px;border:1px solid #f0e6d3}
.pi-img{width:70px;height:70px;border-radius:10px;object-fit:cover;background:linear-gradient(135deg,#fdf3e7,#fae8cc);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px}
.pi-info{flex:1;min-width:0}
.pi-name{font-family:'Playfair Display',serif;font-weight:700;font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-price{color:var(--brown);font-weight:600;font-size:14px;margin-bottom:4px}
.pi-meta{display:flex;gap:5px;flex-wrap:wrap}
.pi-tag{font-size:10px;padding:2px 8px;border-radius:99px}
.tg{background:#fdf3e7;color:var(--brown)}
.tr{background:#fce4ec;color:#c2185b}
.tv{background:#e8f5e9;color:var(--green)}
.pi-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.btn-del{background:var(--red);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-family:'DM Sans';font-size:12px;cursor:pointer}
.btn-sold{background:var(--green);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-family:'DM Sans';font-size:12px;cursor:pointer}
.btn-unsold{background:#ff8f00;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-family:'DM Sans';font-size:12px;cursor:pointer}
.empty-admin{text-align:center;padding:40px 20px;color:#b0956a}
.spin{display:inline-block;width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--dark);color:var(--gold);padding:10px 22px;border-radius:99px;font-size:13px;box-shadow:0 8px 40px rgba(0,0,0,.3);z-index:300;border:1px solid var(--brown);white-space:nowrap;transition:transform .3s,opacity .3s;opacity:0}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span>🏪</span>
    Chợ Đồ Cũ
    <span class="badge-admin">ADMIN</span>
  </div>
  <div class="h-right">
    <a href="/" class="btn-hdr">👁 Cửa hàng</a>
    <button class="btn-hdr btn-logout" onclick="logout()">🚪 Đăng xuất</button>
  </div>
</header>

<div class="stats">
  <div class="stat-card"><span class="stat-n" id="sTotal">-</span><div class="stat-l">Đang bán</div></div>
  <div class="stat-card"><span class="stat-n" id="sSold">-</span><div class="stat-l">Đã bán</div></div>
  <div class="stat-card"><span class="stat-n" id="sViews">-</span><div class="stat-l">Lượt xem</div></div>
  <div class="stat-card"><span class="stat-n" id="sCats">-</span><div class="stat-l">Danh mục</div></div>
</div>

<div class="tabs">
  <div class="tab on" onclick="switchTab('add')">➕ Đăng bán</div>
  <div class="tab" onclick="switchTab('list')">📦 Quản lý (<span id="listCount">0</span>)</div>
</div>

<!-- PANEL: ĐĂNG BÁN -->
<div class="panel on" id="panelAdd">
  <div class="form-card">
    <div class="form-title">📦 Thêm sản phẩm mới</div>
    <form id="addForm" onsubmit="submitProduct(event)">
      <div class="field">
        <label>TÊN SẢN PHẨM *</label>
        <input type="text" name="name" placeholder="Vd: iPhone 12 64GB màu đen" required/>
      </div>
      <div class="row2">
        <div class="field">
          <label>GIÁ BÁN (VNĐ) *</label>
          <input type="number" name="price" placeholder="3500000" required min="0"/>
        </div>
        <div class="field">
          <label>GIÁ GỐC (VNĐ)</label>
          <input type="number" name="orig_price" placeholder="6000000" min="0"/>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>DANH MỤC</label>
          <select name="category">
            <option value="">-- Chọn --</option>
            <option>Điện thoại</option><option>Laptop</option><option>Máy ảnh</option>
            <option>Âm thanh</option><option>Gia dụng</option><option>Nội thất</option>
            <option>Xe đạp</option><option>Phụ kiện</option><option>Quần áo</option>
            <option>Sách</option><option>Khác</option>
          </select>
        </div>
        <div class="field">
          <label>TÌNH TRẠNG</label>
          <select name="condition">
            <option value="">-- Chọn --</option>
            <option>Mới 100%</option><option>Còn 99%</option><option>Còn 95%</option>
            <option>Còn 90%</option><option>Còn 85%</option><option>Còn 80%</option>
            <option>Còn 70%</option><option>Cần sửa chữa</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>KHU VỰC</label>
          <input type="text" name="location" placeholder="Vd: Hà Nội, Q.Đống Đa"/>
        </div>
        <div class="field">
          <label>SỐ ĐIỆN THOẠI</label>
          <input type="tel" name="phone" placeholder="0912345678"/>
        </div>
      </div>
      <div class="field">
        <label>MÔ TẢ SẢN PHẨM</label>
        <textarea name="description" placeholder="Mô tả tình trạng, lý do bán, đã dùng bao lâu..."></textarea>
      </div>
      <div class="field">
        <label>ẢNH SẢN PHẨM</label>
        <div class="img-ph" id="imgPh" onclick="document.getElementById('imgInput').click()">
          📷 Nhấn để chọn ảnh
        </div>
        <img class="img-preview" id="imgPreview" alt="preview"/>
        <input type="file" id="imgInput" name="image" accept="image/*" style="display:none" onchange="previewImg(this)"/>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">🚀 Đăng bán ngay</button>
    </form>
  </div>
</div>

<!-- PANEL: QUẢN LÝ -->
<div class="panel" id="panelList">
  <input class="admin-search" type="text" placeholder="🔍  Tìm sản phẩm..." id="adminSearch" oninput="loadList()"/>
  <div class="filter-row">
    <button class="filter-btn on" onclick="setFilter('all',this)">Tất cả</button>
    <button class="filter-btn" onclick="setFilter('active',this)">Đang bán</button>
    <button class="filter-btn" onclick="setFilter('sold',this)">Đã bán</button>
  </div>
  <div id="prodList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const fmt = p => Number(p).toLocaleString('vi-VN') + '₫';
let listFilter = 'all';
let toastT;

// Kiểm tra đăng nhập khi mở trang
async function checkAuth() {
  try {
    const res = await fetch('/api/check-auth');
    const data = await res.json();
    if (!data.ok) window.location.href = '/login';
  } catch(e) {
    window.location.href = '/login';
  }
}

async function logout() {
  if (!confirm('Đăng xuất khỏi trang quản lý?')) return;
  await fetch('/api/logout', {method: 'POST'});
  window.location.href = '/login';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('on', (i===0&&tab==='add')||(i===1&&tab==='list')));
  document.getElementById('panelAdd').classList.toggle('on', tab === 'add');
  document.getElementById('panelList').classList.toggle('on', tab === 'list');
  if (tab === 'list') loadList();
}

function setFilter(f, btn) {
  listFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  loadList();
}

function previewImg(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('imgPreview');
    prev.src = e.target.result;
    prev.style.display = 'block';
    document.getElementById('imgPh').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

async function submitProduct(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Đang đăng...';
  try {
    const fd = new FormData(e.target);
    const res = await fetch('/api/admin/products', {method:'POST', body: fd});
    if (res.status === 401) { window.location.href = '/login'; return; }
    const data = await res.json();
    if (data.ok) {
      toast('✅ ' + data.message);
      e.target.reset();
      document.getElementById('imgPreview').style.display = 'none';
      document.getElementById('imgPh').style.display = 'flex';
      loadStats();
    } else {
      toast('❌ Có lỗi xảy ra');
    }
  } catch(err) {
    toast('❌ Không kết nối được server');
  }
  btn.disabled = false;
  btn.innerHTML = '🚀 Đăng bán ngay';
}

async function loadList() {
  const search = document.getElementById('adminSearch').value;
  let url = '/api/products?';
  if (listFilter === 'active') url += 'sold=0&';
  if (listFilter === 'sold')   url += 'sold=1&';
  if (search) url += `search=${encodeURIComponent(search)}&`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    document.getElementById('listCount').textContent = data.length;
    renderList(data);
  } catch(e) {
    document.getElementById('prodList').innerHTML = '<div class="empty-admin">⚠️ Lỗi tải dữ liệu</div>';
  }
}

function renderList(list) {
  const el = document.getElementById('prodList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-admin"><div style="font-size:40px;margin-bottom:10px">📭</div><div>Chưa có sản phẩm nào</div></div>';
    return;
  }
  el.innerHTML = list.map(p => {
    const imgEl = p.image
      ? `<img class="pi-img" src="${p.image}" alt="" style="width:70px;height:70px;border-radius:10px;object-fit:cover">`
      : `<div class="pi-img">📦</div>`;
    return `
    <div class="prod-item">
      ${imgEl}
      <div class="pi-info">
        <div class="pi-name" title="${p.name}">${p.name}</div>
        <div class="pi-price">${fmt(p.price)}</div>
        <div class="pi-meta">
          ${p.category  ? `<span class="pi-tag tg">${p.category}</span>` : ''}
          ${p.condition ? `<span class="pi-tag tg">${p.condition}</span>` : ''}
          ${p.sold ? '<span class="pi-tag tr">Đã bán</span>' : '<span class="pi-tag tv">Đang bán</span>'}
          <span class="pi-tag tg">👁 ${p.views}</span>
        </div>
        ${p.location ? `<div style="font-size:11px;color:#8b6a4a;margin-top:4px">📍 ${p.location}</div>` : ''}
      </div>
      <div class="pi-actions">
        ${!p.sold
          ? `<button class="btn-sold"   onclick="markSold(${p.id},1)">✅ Bán rồi</button>`
          : `<button class="btn-unsold" onclick="markSold(${p.id},0)">🔄 Đăng lại</button>`}
        <button class="btn-del" onclick="delProduct(${p.id},'${p.name.replace(/'/g,"\\'")}')">🗑 Xóa</button>
      </div>
    </div>`;
  }).join('');
}

async function markSold(id, sold) {
  try {
    const res = await fetch(`/api/products/${id}`);
    const p = await res.json();
    const fd = new FormData();
    fd.append('name', p.name); fd.append('price', p.price);
    fd.append('orig_price', p.orig_price || 0);
    fd.append('category', p.category || ''); fd.append('condition', p.condition || '');
    fd.append('location', p.location || ''); fd.append('description', p.description || '');
    fd.append('phone', p.phone || ''); fd.append('sold', sold);
    const r = await fetch(`/api/admin/products/${id}`, {method:'PUT', body: fd});
    if (r.status === 401) { window.location.href = '/login'; return; }
    toast(sold ? '✅ Đã đánh dấu bán rồi!' : '🔄 Đã đăng lại!');
    loadList(); loadStats();
  } catch(e) { toast('❌ Lỗi cập nhật'); }
}

async function delProduct(id, name) {
  if (!confirm(`Xóa "${name}"?`)) return;
  try {
    const res = await fetch(`/api/admin/products/${id}`, {method:'DELETE'});
    if (res.status === 401) { window.location.href = '/login'; return; }
    const data = await res.json();
    toast('🗑 ' + data.message);
    loadList(); loadStats();
  } catch(e) { toast('❌ Lỗi xóa'); }
}

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const d = await res.json();
    document.getElementById('sTotal').textContent  = d.total;
    document.getElementById('sSold').textContent   = d.sold;
    document.getElementById('sViews').textContent  = d.views;
    document.getElementById('sCats').textContent   = d.cats;
  } catch(e){}
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('on'), 2800);
}

checkAuth();
loadStats();
</script>
</body>
</html>
