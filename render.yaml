services:
  - type: web
    name: webdocu
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: RENDER
        value: "true"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: chodocus123
    disk:
      name: webdocu-data
      mountPath: /data
      sizeGB: 1
